<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversation Feed</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            font-size: 16px;
            background: none;
        }
        #feed {
            width: 600px; /* Matches approximate width of reasoning-machine.github.io central block */
            padding: 20px 0;
            overflow-y: auto;
            max-height: 100vh;
        }
        .message {
            margin: 0;
            padding: 10px 0; /* Vertical separation */
            white-space: pre-wrap; /* Preserves line breaks and spaces */
        }
    </style>
</head>

    </script>
</body>
</html>
