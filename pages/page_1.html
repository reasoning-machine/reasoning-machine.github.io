<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversation Feed</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            font-family: "Times New Roman", Times, serif;
            font-size: 16px;
            background: none;
        }
        #feed {
            width: 750px; /* Matches central block width */
            padding: 20px 0;
            overflow-y: auto;
            max-height: 100vh;
        }
        .message {
            margin: 0;
            padding: 8px 0; /* Adjusted for vertical separation, matching site */
            line-height: 1.4; /* Matches approximate line height of main page */
            white-space: pre-wrap; /* Preserves line breaks and spaces */
        }
    </style>
</head>

    </div>
    <script>
        // No JavaScript needed for Stage 1, as it's a static single message
    </script>
</body>
</html>
