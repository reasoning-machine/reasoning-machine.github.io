<html lang="en">
<head>

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            background: none;
        }
        #feed {
            width: 750px; /* Matches central block width */
            padding: 20px 0;
            overflow-y: auto;

        }
        .message {
            margin: 0;
            padding: 8px 0; /* Vertical separation */

        }
    </style>
</head>

        // No JavaScript needed for Stage 1, as it's a static single message
    </script>

</html>
